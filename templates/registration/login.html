<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - Analytech ERP</title>
    <style>
        body {
            margin: 0;
            font-family: Tahoma, Arial, sans-serif;
            background: #f5f7fa;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.10);
            padding: 30px;
        }

        .title {
            margin: 0 0 8px 0;
            color: #0f3d56;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
        }

        .sub {
            margin-bottom: 20px;
            color: #666;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            border: none;
            background: #0f3d56;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0c2f42;
        }

        .errorlist {
            color: #b02a37;
            margin: 0 0 12px 0;
            padding-right: 18px;
        }

        .help {
            margin-top: 18px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="card">
        <h1 class="title">Analytech ERP</h1>
        <div class="sub">تسجيل الدخول إلى النظام</div>

        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                {{ form.non_field_errors }}
            {% endif %}

            <label for="id_username">اسم المستخدم</label>
            {{ form.username }}

            <label for="id_password">كلمة المرور</label>
            {{ form.password }}

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <button type="submit" class="btn">دخول</button>
        </form>

        <div class="help">
            إدارة المستخدمين والصلاحيات تتم من خلال لوحة الإدارة.
        </div>
    </div>
</div>
</body>
</html>
