{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="topbar">
    <div>
        <h1>{{ page_title }}</h1>
        <div class="sub">إنشاء فاتورة جديدة بشكل بسيط واحترافي</div>
    </div>
    <div class="quick-links">
        <a href="{% url 'invoice_list' %}">رجوع للفواتير</a>
    </div>
</div>

<div class="section">
    <form method="post">
        {% csrf_token %}

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
            <div>
                <label style="display:block; margin-bottom:6px;">اسم العميل</label>
                {{ form.customer_name }}
            </div>

            <div>
                <label style="display:block; margin-bottom:6px;">نسبة الخصم %</label>
                {{ form.discount_percent }}
            </div>

            <div>
                <label style="display:block; margin-bottom:6px;">نسبة الضريبة %</label>
                {{ form.vat_percent }}
            </div>

            <div></div>

            <div style="grid-column:1 / -1;">
                <label style="display:block; margin-bottom:6px;">ملاحظات</label>
                {{ form.notes }}
            </div>
        </div>

        <div style="margin-top:22px;">
            <button type="submit" style="padding:12px 18px; border:none; border-radius:8px; background:#0f3d56; color:#fff; cursor:pointer;">
                حفظ الفاتورة
            </button>
        </div>
    </form>
</div>
{% endblock %}
